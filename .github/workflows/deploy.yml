name: Deploy Vite Build
on:
  push:
    branches: [main] # Reaguje, gdy wypchniesz kod do głównej gałęzi
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Production Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: production
          clean: true
